<!-- Industries Strip -->
<section class="py-16 md:py-24 bg-navy-50/60 border-y border-navy-100">
  <div class="max-w-7xl mx-auto px-6">
    <div class="text-center max-w-2xl mx-auto reveal">
      <span class="eyebrow">Industries Served</span>
      <h2 class="font-display font-extrabold text-2xl md:text-4xl text-navy-900 mt-5 leading-[1.15]">
        {{heading}}
      </h2>
    </div>

    <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-5 mt-12">
      <div class="reveal rounded-2xl bg-white border border-navy-100 p-6 shadow-card hover:border-brand-orange/40 hover:shadow-soft transition">
        <div class="w-12 h-12 rounded-xl bg-grad-brand text-white flex items-center justify-center mb-4">
          <i data-lucide="stethoscope" class="w-6 h-6"></i>
        </div>
        <h3 class="font-display font-bold text-lg text-navy-900">Healthcare</h3>
        <p class="text-navy-900/65 text-sm mt-2 leading-relaxed">{{healthcare-desc}}</p>
      </div>

      <div class="reveal rounded-2xl bg-white border border-navy-100 p-6 shadow-card hover:border-brand-orange/40 hover:shadow-soft transition">
        <div class="w-12 h-12 rounded-xl bg-grad-brand text-white flex items-center justify-center mb-4">
          <i data-lucide="headphones" class="w-6 h-6"></i>
        </div>
        <h3 class="font-display font-bold text-lg text-navy-900">BPO</h3>
        <p class="text-navy-900/65 text-sm mt-2 leading-relaxed">{{bpo-desc}}</p>
      </div>

      <div class="reveal rounded-2xl bg-white border border-navy-100 p-6 shadow-card hover:border-brand-orange/40 hover:shadow-soft transition">
        <div class="w-12 h-12 rounded-xl bg-grad-brand text-white flex items-center justify-center mb-4">
          <i data-lucide="shield" class="w-6 h-6"></i>
        </div>
        <h3 class="font-display font-bold text-lg text-navy-900">Insurance</h3>
        <p class="text-navy-900/65 text-sm mt-2 leading-relaxed">{{insurance-desc}}</p>
      </div>

      <div class="reveal rounded-2xl bg-white border border-navy-100 p-6 shadow-card hover:border-brand-orange/40 hover:shadow-soft transition">
        <div class="w-12 h-12 rounded-xl bg-grad-brand text-white flex items-center justify-center mb-4">
          <i data-lucide="cpu" class="w-6 h-6"></i>
        </div>
        <h3 class="font-display font-bold text-lg text-navy-900">IT</h3>
        <p class="text-navy-900/65 text-sm mt-2 leading-relaxed">{{it-desc}}</p>
      </div>
    </div>
  </div>
</section>
